[pytest]
# Pytest configuration for STT project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Console output options
console_output_style = progress
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider

# Custom markers
markers =
    integration: Integration tests that require real components
    slow: Tests that take longer to run

# Warnings
filterwarnings =
    error::DeprecationWarning
    ignore::DeprecationWarning:unittest2.*
